<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hành trình Blockchain</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Guided learning game</p>
        <h1>Hành trình Blockchain</h1>
      </div>
      <div class="top-actions">
        <button id="resetBtn" class="ghost">Làm lại từ đầu</button>
      </div>
    </header>

    <main class="app-shell">
      <aside class="panel mission-panel">
        <div class="panel-head">
          <p class="eyebrow">Bản đồ nhiệm vụ</p>
          <h2>Tiến trình</h2>
        </div>
        <ol id="missionMap" class="mission-map"></ol>
      </aside>

      <section class="panel simulation-panel">
        <div class="panel-head">
          <p id="stepEyebrow" class="eyebrow">Bước 0</p>
          <h2 id="stepTitle">Intro mission</h2>
        </div>
        <div id="simulationArea" class="simulation-area"></div>
      </section>

      <aside class="panel learning-panel">
        <div class="panel-head">
          <p class="eyebrow">Learning panel</p>
          <h2>Học từ cơ chế</h2>
        </div>

        <section class="learn-box">
          <h3>Nhiệm vụ hiện tại</h3>
          <p id="currentMission"></p>
        </section>

        <section class="learn-box">
          <h3>Gate status</h3>
          <div id="gateStatus" class="gate-stack"></div>
        </section>

        <section class="learn-box">
          <h3>Giải thích đúng lúc</h3>
          <div id="explainPanel" class="explain-panel"></div>
        </section>

        <section class="learn-box">
          <h3>Hint</h3>
          <p id="hintBalance" class="hint-balance"></p>
          <button id="hintBtn" class="ghost">Cần gợi ý</button>
          <div id="hintPanel" class="hint-panel"></div>
        </section>

        <section class="learn-box">
          <h3>Từ điển mở khóa</h3>
          <div id="dictionaryPanel" class="dictionary-panel"></div>
        </section>

        <section class="learn-box quiz-box">
          <h3>Quiz gate</h3>
          <div id="quizPanel"></div>
        </section>
      </aside>
    </main>

    <section class="panel log-panel">
      <div class="panel-head">
        <p class="eyebrow">Learning log</p>
        <h2>Dấu vết học tập</h2>
      </div>
      <div id="learningLog" class="learning-log"></div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
